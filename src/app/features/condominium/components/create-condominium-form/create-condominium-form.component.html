<ng-container *transloco="let t">
  <form [formGroup]="createCondominiumForm" (ngSubmit)="onSubmit()">
    <ion-input
      formControlName="name"
      [label]="t('condominium.createForm.name')"
      [placeholder]="t('condominium.createForm.name')"
      [errorText]="nameError$ | async"
      required
    ></ion-input>
    <ion-textarea
      formControlName="address"
      [label]="t('condominium.createForm.address')"
      [placeholder]="t('condominium.createForm.address')"
      required
    ></ion-textarea>
    <ion-input
      formControlName="currency"
      [label]="t('condominium.createForm.currency')"
      [placeholder]="t('condominium.createForm.currency')"
      [errorText]="currencyError$ | async"
      required
    ></ion-input>
    <ion-button
      type="submit"
      expand="block"
      class="ion-padding-top"
      [disabled]="
        createCondominiumForm.touched && createCondominiumForm.invalid
      "
    >
      {{ t("condominium.createForm.createButton") }}
    </ion-button>
  </form>
</ng-container>
