<ion-modal [isOpen]="isOpen()" (didDismiss)="onModalDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ 'condominium.hub.invitationCode.qrTitle' | transloco }}</ion-title>
        <ion-button slot="end" fill="clear" (click)="onModalDismiss()">
          <ion-icon name="close" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <div class="qr-container">
        @if (qrCodeDataUrl(); as dataUrl) {
          <img [src]="dataUrl" alt="QR Code" class="qr-image" />
          <p class="qr-description">{{ 'condominium.hub.invitationCode.qrDescription' | transloco }}</p>
          @if (invitationUrl(); as url) {
            <div class="url-display">
              <span class="url-text">{{ url }}</span>
              <ion-button fill="clear" (click)="copyUrlToClipboard(url)">
                <ion-icon name="copy-outline"></ion-icon>
              </ion-button>
            </div>
          }
        } @else {
          <div class="loading">
            <ion-spinner name="crescent"></ion-spinner>
          </div>
        }
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
