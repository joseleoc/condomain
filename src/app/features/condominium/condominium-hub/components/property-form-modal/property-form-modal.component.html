<ion-modal
  [isOpen]="isOpen()"
  [backdropDismiss]="false"
  (didDismiss)="isOpenChange.emit(false)"
>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>
          {{ (isEditMode() ? 'condominium.hub.properties.editTitle' : 'condominium.hub.properties.addTitle') | transloco }}
        </ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" color="secondary" (click)="isOpenChange.emit(false)">
            {{ "common.cancel" | transloco }}
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" [scrollY]="true">
      <p class="text-secondary structure-modal-description ion-padding-bottom">
        {{ "condominium.createProperty.description" | transloco }}
      </p>
      <app-property-form
        [initialData]="initialData()"
        [structureOptions]="structureOptions()"
      />
    </ion-content>

    <ion-footer>
      <ion-toolbar>
        <ion-buttons slot="end">
          <ion-button fill="solid" color="primary" (click)="handleSubmit()">
            {{ "common.save" | transloco }}
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-footer>
  </ng-template>
</ion-modal>
