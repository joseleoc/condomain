<ng-container *transloco="let t">
  <!-- Offline indicator -->
  @if (!isOnline()) {
    <ion-chip color="warning" [title]="t('condominium.hub.offline.tooltip')">
      <ion-badge color="warning">{{ t('condominium.hub.offline.badge') }}</ion-badge>
    </ion-chip>
  }

  <!-- Read-only indicator for non-admins -->
  @if (!isAdmin() && isOnline()) {
    <ion-chip color="medium" [title]="t('condominium.hub.readOnly.tooltip')">
      <ion-badge color="medium">{{ t('condominium.hub.readOnly.badge') }}</ion-badge>
    </ion-chip>
  }
</ng-container>
