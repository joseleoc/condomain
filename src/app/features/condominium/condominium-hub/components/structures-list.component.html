<ng-container *transloco="let t">
  <!-- Pull to refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content />
  </ion-refresher>

  <!-- Skeleton loader -->
  <ion-list *ngIf="isLoading()">
    <ion-item *ngFor="let _ of [1,2,3]">
      <ion-skeleton-text [animated]="true" slot="start" style="width: 40px; height: 40px; border-radius: 8px;" />
      <ion-label>
        <ion-skeleton-text [animated]="true" style="width: 50%;" />
        <ion-skeleton-text [animated]="true" style="width: 30%;" />
      </ion-label>
    </ion-item>
  </ion-list>

  <!-- Error state -->
  <div class="error-state" *ngIf="error() && !isLoading()">
    <ion-icon name="alert-circle-outline" size="large" color="danger" />
    <p>{{ error()?.message || 'Failed to load structures' }}</p>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!isLoading() && structures().length === 0 && !error()">
    <ion-icon [name]="buildingIcon" size="large" />
    <h3>{{ t('condominium.hub.structures.emptyTitle') }}</h3>
    <p>{{ t('condominium.hub.structures.emptyDescription') }}</p>
  </div>

  <!-- Structures list -->
  <ion-list *ngIf="!isLoading() && structures().length > 0">
    <ion-item *ngFor="let structure of structures()">
      <ion-icon [name]="buildingIcon" slot="start" color="primary" />
      <ion-label>
        <h3>{{ structure.name }}</h3>
        <p *ngIf="structure.description">{{ structure.description }}</p>
      </ion-label>
      <ion-buttons slot="end" *ngIf="isAdmin()">
        <ion-button color="danger" fill="clear" (click)="onDelete(structure)">
          <ion-icon [name]="trashIcon" slot="icon-only" />
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
</ng-container>
