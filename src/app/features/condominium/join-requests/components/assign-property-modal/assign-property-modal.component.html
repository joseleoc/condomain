<ion-modal [isOpen]="isOpen()" (didDismiss)="onCancel()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ 'joinRequests.assignProperty.title' | transloco }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="onCancel()">
            <ion-icon name="close" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <app-assign-property-form
        [condominiumId]="condominiumId()"
        [userProfile]="userProfile()"
        (propertyAssigned)="onPropertyAssigned($event)"
        (cancelled)="onCancel()"
      />
    </ion-content>
  </ng-template>
</ion-modal>
