<ion-card
  class="category-card"
  [style.background-color]="category().color ?? 'var(--ion-color-primary)'"
>
  <div class="category-card-content">
    <ion-icon [name]="iconName()" class="category-icon"></ion-icon>

    <span class="category-name">
      @if (category().i18n_key) {
        {{ 'financial.categories.system.' + category().i18n_key | transloco }}
      } @else {
        {{ category().name }}
      }
    </span>

    @if (isSystem()) {
      <ion-icon
        name="lock-closed"
        class="system-lock"
        [attr.aria-label]="'financial.categories.systemLock' | transloco"
      ></ion-icon>
    }

    @if (canEdit()) {
      <div class="category-actions">
        <button
          type="button"
          class="action-button edit-button"
          (click)="onEdit(); $event.stopPropagation()"
        >
          <ion-icon name="create-outline"></ion-icon>
        </button>
        <button
          type="button"
          class="action-button delete-button"
          (click)="onDelete(); $event.stopPropagation()"
        >
          <ion-icon name="trash-outline"></ion-icon>
        </button>
      </div>
    }
  </div>
</ion-card>
