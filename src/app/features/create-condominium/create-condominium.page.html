<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/condominium" />
    </ion-buttons>

    <div>
      <ion-title color="primary">Condomain</ion-title>
    </div>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding" [fullscreen]="true">
  <div class="stepper-container">
    <ion-text class="text-secondary">{{ stepLabel() | transloco }}</ion-text>
    <ion-progress-bar [value]="progressPercentage()"></ion-progress-bar>
  </div>

  @switch (step()) { @case (1) {
  <app-create-condominium-form
    [loading]="loading()"
    [showSubmitButton]="false"
  />
  } }
</ion-content>
<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" color="tertiary" (click)="goBack()"
        >{{ 'common.back' | transloco }}</ion-button
      >
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button
        type="submit"
        fill="solid"
        color="primary"
        [disabled]="loading()"
        (click)="handleNextStep()"
      >
        @if (loading()) {
        <ion-spinner name="crescent"></ion-spinner>
        } @else { {{ 'condominium.createForm.createButton' | transloco }} }
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
