<ion-header>
  <ion-toolbar>
    <ion-title color="primary">Condomain</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="openHelpModal()">
        <ion-icon
          name="help-circle-outline"
          slot="icon-only"
          [@helpPulse]="step() + (step() === 2 && wizardService.creationProcessSelected() === null ? '-selector' : '')"
        ></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding" [fullscreen]="true">
  <div class="stepper-container">
    <ion-text class="text-secondary">{{ stepLabel() | transloco }}</ion-text>
    <ion-progress-bar [value]="progressPercentage()"></ion-progress-bar>
  </div>

  <div class="content-container">
    @switch (step()) { @case (1) {
    <app-step-1 />
    } @case (2) {
    <app-step-2 />
    } @case (3) {
    <app-step-3 />
    } }
  </div>
</ion-content>

<app-wizard-footer />

<ion-modal
  [isOpen]="isHelpModalOpen()"
  (ionModalDidDismiss)="closeHelpModal()"
  [backdropDismiss]="true"
>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ helpTitle() | transloco }}</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" color="secondary" (click)="closeHelpModal()">
            {{ "common.dismiss" | transloco }}
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <p class="help-modal-body">{{ helpBody() | transloco }}</p>
    </ion-content>
  </ng-template>
</ion-modal>
