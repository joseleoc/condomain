<app-main-layout>
  <ion-content class="ion-padding">
    <article class="join-container">
      <div class="join-header">
        <h1>{{ "join.title" | transloco }}</h1>
        <p class="text-secondary">{{ "join.subtitle" | transloco }}</p>
      </div>

      <div class="input-container">
        <ion-input
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          [placeholder]="'join.codePlaceholder' | transloco"
          [value]="invitationCode()"
          (ionInput)="invitationCode.set($any($event).detail.value || '')"
          [disabled]="loading()"
          fill="outline"
        ></ion-input>

        @if (error()) {
          <ion-text color="danger" class="error-text">
            {{ error() | transloco }}
          </ion-text>
        }
      </div>

      <ion-button
        expand="block"
        [disabled]="invitationCode().length !== 6 || loading()"
        (click)="handleSubmit()"
      >
        @if (loading()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          {{ "join.submit" | transloco }}
        }
      </ion-button>
    </article>
  </ion-content>
</app-main-layout>
