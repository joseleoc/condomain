<ng-container *transloco="let t">
  <app-auth-layout [title]="t('auth.signIn.title')" [showBackButton]="false">
    <div class="auth-form-container">
      <app-sign-in-form (submitSignInForm)="onSubmitSignInForm($event)" />
    </div>
    <div class="redirect-list">
      <a [routerLink]="['/auth/sign-up']">{{ t('auth.goToRegister') }}</a>
      <a [routerLink]="['/auth/forgot-password']"
        >{{ t('auth.goToForgotPassword') }}</a
      >
    </div>
  </app-auth-layout>
</ng-container>
