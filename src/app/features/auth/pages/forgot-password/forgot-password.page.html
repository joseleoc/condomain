<ng-container *transloco="let t">
  <app-auth-layout [title]="t('auth.forgotPassword.title')">
    <div class="auth-form-container">
      <app-forgot-password-form
        (submitForgotPasswordForm)="onSubmitForgotPasswordForm($event)"
      />
    </div>
    <div class="redirect-list">
      <a [routerLink]="['/auth/sign-in']">{{ t('auth.goToLogin') }}</a>
    </div>
  </app-auth-layout>
</ng-container>
