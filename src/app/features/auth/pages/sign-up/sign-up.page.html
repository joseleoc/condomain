

<ng-container *transloco="let t">
<app-main-layout [title]="t('auth.signUp.title')">
  <app-sign-up-form (submitSignUpForm)="onSubmitSignUpForm($event)" />
  <div class="redirect-list">
    <a [routerLink]="['/auth/sign-in']">{{ t('auth.goToLogin') }}</a>
  </div>
</app-main-layout>
</ng-container>
