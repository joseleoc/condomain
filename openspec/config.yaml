# openspec/config.yaml
# Auto-generated by sdd-init — 2026-06-19
schema: spec-driven

context: |
  Tech stack: Angular 20 + Ionic 8 + Capacitor 8 + Supabase
  Architecture: Standalone components (no NgModules), feature-based, container-presentational
  State: RxJS BehaviorSubjects + Angular Signals
  i18n: Transloco (ES default, EN always synced)
  Build: Angular CLI (application builder), pnpm
  Testing: Jasmine 6 + Karma 6
  Linting: ESLint + @angular-eslint (no formatter detected)
  Type checking: TypeScript 5.9 strict mode
  Conventions: Conventional Commits (scope required), TDD-first, kebab-case files, barrel exports, path aliases, inject() over constructors

rules:
  proposal:
    - Include rollback plan for risky changes
    - Align with multi-condominium membership and role-based access model
    - Respect double-entry accounting invariants
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cover immutability constraints (no DEL/UPD on processed transactions)
    - Cover multi-currency and exchange rate invariants
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Respect container-presentational component boundaries
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Always include test tasks alongside implementation
  apply:
    - Follow existing code patterns (standalone, inject(), signals, async pipe)
    - Use strict TDD: RED-GREEN-REFACTOR
    tdd: true
    test_command: "pnpm test"
  verify:
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner: karma
  framework: jasmine
  version: "6.3"
  command: "pnpm test"
  coverage: true
  coverage_command: "ng test --code-coverage"
  layers:
    unit: true
    integration: false
    e2e: false
  quality:
    linter: "pnpm lint"
    type_checker: "tsc --noEmit"
    formatter: null
